spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.properties.hibernate.globally_quoted_identifiers_skip_column_definitions=true
spring.datasource.url=jdbc:h2:mem:test-db;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
wallet.operator.id=test-operator
wallet.operator.key=test-key
wallet.currency.id=test-currency
wallet.currency.supply.key=test-supply-key
wallet.new-account.initial-funding=10
