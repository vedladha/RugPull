spring.application.name=backend
server.address=0.0.0.0
server.port=8080

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.datasource.url=jdbc:mysql://database:3306/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

management.endpoints.web.exposure.include=*
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

jwt.secret=your_jwt_secret_key
hedera.operator.id=${HEDERA_OPERATOR_ID:}
hedera.operator.key=${HEDERA_OPERATOR_KEY:}
hedera.network=${HEDERA_NETWORK:testnet}
hedera.new-account.initial-hbar=${HEDERA_NEW_ACCOUNT_INITIAL_HBAR:10}
