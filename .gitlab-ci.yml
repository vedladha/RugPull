image: docker:24.0.5
services:
  - docker:24.0.5-dind

variables:
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""

  DB_NAME: marketplace
  DB_USER: pipeline

  HEDERA_NETWORK: testnet
  HEDERA_NEW_ACCOUNT_INITIAL_HBAR: "100"

stages:
  #- lint
  - test

# Frontend
