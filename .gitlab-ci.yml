#  image: node:20-slim
#  allow_failure: true
#  script:
#    - cd frontend
#    - npm ci
#    - npm run lint

frontend-test:
  stage: test
  image: node:20-slim
  script:
    - cd frontend
    - npm ci
    - npm run test:unit

# Backend
#backend-lint:
#  stage: lint
#  image: eclipse-temurin:21-jdk
#  allow_failure: true
#  script:
#    - cd backend
#    - chmod +x gradlew
#    - ./gradlew checkstyleMain

backend-test:
  stage: test
  image: eclipse-temurin:21-jdk
  services:
    - name: mysql:8.0
      alias: mysql
  variables:
    MYSQL_DATABASE: $DB_NAME
    MYSQL_USER: $DB_USER
    MYSQL_PASSWORD: $DB_PASSWORD
    MYSQL_ROOT_PASSWORD: $DB_ROOT_PASSWORD
  script:
    - apt-get update && apt-get install -y mysql-client
    - cat database/database_init/*.sql | mysql -h mysql -u $MYSQL_USER -p$MYSQL_PASSWORD $MYSQL_DATABASE
    - cd backend
    - chmod +x gradlew
    - ./gradlew test

