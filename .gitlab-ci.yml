image: docker:24.0.5
services:
  - docker:24.0.5-dind

variables:
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""

  DB_NAME: marketplace
  DB_USER: pipeline

  HEDERA_NETWORK: testnet
  HEDERA_NEW_ACCOUNT_INITIAL_HBAR: "100"

stages:
  - lint
  - test

# Frontend
frontend-lint:
  stage: lint
  image: node:20-slim
  allow_failure: true
  script:
    - cd frontend
    - npm ci
    - npm run lint

frontend-test:
  stage: test
  image: node:20-slim
  script:
    - cd frontend
    - npm ci
    - npm run test:unit

# Backend
backend-lint:
  stage: lint
  image: eclipse-temurin:21-jdk
  script:
    - cd backend
    - chmod +x gradlew
    - ./gradlew checkstyleMain

backend-test:
  stage: test
  image: eclipse-temurin:21-jdk
  allow_failure: true
  services:
    - name: mysql:8.0
      alias: mysql
  variables:
    MYSQL_DATABASE: $DB_NAME
    MYSQL_USER: $DB_USER
    MYSQL_PASSWORD: $DB_PASSWORD
    MYSQL_ROOT_PASSWORD: $DB_ROOT_PASSWORD
  script:
    - cd backend
    - apt-get update && apt-get install -y mysql-client
    - cat ../database/*.sql | mysql -h mysql -u $MYSQL_USER -p$MYSQL_ROOT_PASSWORD $MYSQL_DATABASE
    - chmod +x gradlew
    - ./gradlew test

# Crypto
crypto-lint:
  stage: lint
  image: eclipse-temurin:21-jdk
  script:
    - cd rpc_currency
    - chmod +x gradlew
    - ./gradlew checkstyleMain

crypto-test:
  stage: test
  image: eclipse-temurin:21-jdk
  script:
    - cd rpc_currency
    - chmod +x gradlew
    - ./gradlew test
