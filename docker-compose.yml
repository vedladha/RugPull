services:
  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:80" # Host port 3000 [can change if needed], container port 80 [DO NOT CHANGE, nginx listens on port 80]
    depends_on:
      backend:
        condition: service_started

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "3001:8080" # Host port 3001 [can change if needed], container port 8080 [DO NOT CHANGE, spring boot listens on port 8080]
    depends_on:
      database:
        condition: service_healthy
    environment:
      - DB_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - HEDERA_OPERATOR_ID=${HEDERA_OPERATOR_ID}
      - HEDERA_OPERATOR_KEY=${HEDERA_OPERATOR_KEY}
      - RPC_CURRENCY_ID=${RPC_CURRENCY_ID}
      - HEDERA_NETWORK=testnet
      - HEDERA_NEW_ACCOUNT_INITIAL_HBAR=${HEDERA_NEW_ACCOUNT_INITIAL_HBAR}

  database:
    build: ./database
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3002:3306" # Host port 3002 [can change if needed], container port 3306 [DO NOT CHANGE, mysql listens on port 3306]
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${DB_USER}", "-p${DB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 5

  rpc_currency:
    build: ./rpc_currency
    profiles: ["tools"] # only ran when specified with "--profile tools"
    restart: "no"
    env_file:
      - ./rpc_currency/.env
    volumes:
      - ./rpc_currency/app:/app

volumes:
  db_data:
  item-images: